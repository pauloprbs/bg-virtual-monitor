services:
  app:
    build: .
    container_name: bg_virtual_monitor_app
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
      - .:/app

  frontend:
    build: .
    container_name: bg_virtual_monitor_frontend
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "app/frontend.py", "--server.port=8501", "--server.address=0.0.0.0"]
    environment:
      - BACKEND_URL=http://app:8000
    env_file:
      - .env
    depends_on:
      - app

  db:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - 11434:11434
    volumes:
      - ollama_storage:/root/.ollama
    restart: always
    entrypoint: /bin/sh
    command: >
      -c "/bin/ollama serve &
          sleep 10 &&
          ollama pull bge-m3 &&
          ollama pull qwen2.5:3b &&
          tail -f /dev/null"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q qwen2.5"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  bg_virtual_monitor_app:
  postgres_data:
  ollama_storage: